<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBot — Weather Forecast Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(14,165,233,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 60%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 45% 8%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      background: rgba(30,41,59,0.85);
      border: 1px solid rgba(56,189,248,0.2);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      backdrop-filter: blur(12px);
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(14,165,233,0.4);
    }

    .header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-text p { font-size: 12px; color: #94a3b8; font-family: 'DM Mono', monospace; margin-top: 2px; }

    .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'DM Mono', monospace; color: #22c55e; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #chat {
      height: 420px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(15,23,42,0.75);
      border-left: 1px solid rgba(56,189,248,0.2);
      border-right: 1px solid rgba(56,189,248,0.2);
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 85%; animation: fadeUp 0.25s ease; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot { align-self: flex-start; align-items: flex-start; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .label { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; color: #94a3b8; text-transform: uppercase; }

    .bubble { padding: 11px 16px; border-radius: 16px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; }
    .user .bubble { background: linear-gradient(135deg, #0ea5e9, #0369a1); color: #fff; border-bottom-right-radius: 4px; }
    .bot .bubble { background: #1e293b; color: #f8fafc; border: 1px solid rgba(56,189,248,0.15); border-bottom-left-radius: 4px; }

    .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: #38bdf8; animation: bounce 1.1s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce { 0%,70%,100%{transform:translateY(0);opacity:0.5} 35%{transform:translateY(-6px);opacity:1} }

    #quick-wrap {
      padding: 12px 20px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      background: rgba(15,23,42,0.75);
      border-left: 1px solid rgba(56,189,248,0.2);
      border-right: 1px solid rgba(56,189,248,0.2);
    }

    .chip {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      padding: 5px 12px;
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 20px;
      background: rgba(56,189,248,0.06);
      color: #38bdf8;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { background: rgba(56,189,248,0.14); border-color: #38bdf8; }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      background: rgba(30,41,59,0.9);
      border: 1px solid rgba(56,189,248,0.2);
      border-top: 1px solid rgba(56,189,248,0.1);
      border-radius: 0 0 20px 20px;
    }

    #user-input {
      flex: 1;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      color: #f8fafc;
      outline: none;
      transition: border-color 0.15s;
    }
    #user-input::placeholder { color: #94a3b8; }
    #user-input:focus { border-color: #38bdf8; }

    #send-btn {
      background: linear-gradient(135deg, #0ea5e9, #0369a1);
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:hover { opacity: 0.9; transform: scale(1.02); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .footer { text-align: center; font-size: 11px; font-family: 'DM Mono', monospace; color: #334155; margin-top: 12px; }
    .footer a { color: #334155; }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo">⛅</div>
    <div class="header-text">
      <h1>SkyBot</h1>
      <p>weather forecast assistant · powered by Gemini</p>
    </div>
    <div class="status"><div class="dot"></div>online</div>
  </div>

  <div id="chat"></div>

  <div id="quick-wrap">
    <button class="chip" onclick="sendQuick('Weather in Chennai today')">Chennai today</button>
    <button class="chip" onclick="sendQuick('Will it rain in Mumbai this week?')">Mumbai rain?</button>
    <button class="chip" onclick="sendQuick('Best time to visit Manali?')">Manali travel</button>
    <button class="chip" onclick="sendQuick('What to wear in Delhi this weekend?')">Delhi outfit tips</button>
    <button class="chip" onclick="sendQuick('Weather in London right now')">London now</button>
  </div>

  <div id="input-row">
    <input id="user-input" type="text" placeholder="Ask about weather anywhere in the world..." />
    <button id="send-btn" onclick="sendMessage()">Send ↗</button>
  </div>
</div>

<div class="footer">Built with Gemini AI · <a href="https://github.com" target="_blank">View on GitHub</a></div>

<script>
  const API_KEY = 'AIzaSyBImjTI--l2uwxfHBth2hfCoPccL9N8gD4';
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

  const SYSTEM = `You are SkyBot, a friendly weather forecast chatbot. When users ask about weather, provide:
- Current conditions and temperature (use your knowledge of typical weather patterns and seasons)
- Today's expected high/low
- A short 3-day forecast if relevant
- One practical tip (umbrella, jacket, sunscreen, etc.)
Use minimal weather emoji (☀️ 🌧️ ❄️ 🌤️ ⛅ 🌩️). Be concise, warm, and helpful. If asked about non-weather topics, politely redirect to weather questions.`;

  const history = [];
  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'SkyBot';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.id = 'typing';
    wrap.className = 'msg bot';
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'SkyBot';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  async function callGemini(userText) {
    history.push({ role: 'user', parts: [{ text: userText }] });

    const body = {
      system_instruction: { parts: [{ text: SYSTEM }] },
      contents: history
    };

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const reply = data.candidates[0].content.parts[0].text.trim();
    history.push({ role: 'model', parts: [{ text: reply }] });
    return reply;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    sendBtn.disabled = true;
    document.getElementById('quick-wrap').style.display = 'none';
    addMessage('user', text);
    const typing = addTyping();

    try {
      const reply = await callGemini(text);
      typing.remove();
      addMessage('bot', reply);
    } catch (e) {
      typing.remove();
      addMessage('bot', 'Sorry, something went wrong. Please try again! (' + e.message + ')');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function sendQuick(text) { inputEl.value = text; sendMessage(); }
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  addMessage('bot', "Hi! I'm SkyBot ⛅ Ask me about weather anywhere in the world — current conditions, forecasts, or travel tips!");
</script>
</body>
</html>

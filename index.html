<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBot — Weather Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(14,165,233,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 60%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 45% 8%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      background: rgba(30,41,59,0.85);
      border: 1px solid rgba(56,189,248,0.2);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
    }

    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #0ea5e9, #0369a1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(14,165,233,0.4);
    }

    .header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-text p { font-size: 12px; color: #94a3b8; font-family: 'DM Mono', monospace; margin-top: 2px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'DM Mono', monospace; color: #22c55e; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #search-area {
      padding: 16px 20px;
      background: rgba(15,23,42,0.75);
      border-left: 1px solid rgba(56,189,248,0.2);
      border-right: 1px solid rgba(56,189,248,0.2);
      display: flex;
      gap: 8px;
    }

    #city-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 15px;
      font-family: 'Syne', sans-serif;
      color: #f8fafc;
      outline: none;
      transition: border-color 0.15s;
    }
    #city-input::placeholder { color: #475569; }
    #city-input:focus { border-color: #38bdf8; }

    #search-btn {
      background: linear-gradient(135deg, #0ea5e9, #0369a1);
      border: none;
      border-radius: 12px;
      padding: 11px 22px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    #search-btn:hover { opacity: 0.9; transform: scale(1.02); }
    #search-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #quick-wrap {
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      background: rgba(15,23,42,0.75);
      border-left: 1px solid rgba(56,189,248,0.2);
      border-right: 1px solid rgba(56,189,248,0.2);
    }

    .chip {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      padding: 5px 12px;
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 20px;
      background: rgba(56,189,248,0.06);
      color: #38bdf8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { background: rgba(56,189,248,0.14); border-color: #38bdf8; }

    #results {
      min-height: 320px;
      padding: 20px;
      background: rgba(15,23,42,0.75);
      border-left: 1px solid rgba(56,189,248,0.2);
      border-right: 1px solid rgba(56,189,248,0.2);
      border-bottom: 1px solid rgba(56,189,248,0.2);
      border-radius: 0 0 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .placeholder { text-align: center; color: #334155; }
    .placeholder .big { font-size: 48px; margin-bottom: 12px; }
    .placeholder p { font-size: 14px; font-family: 'DM Mono', monospace; }

    .current-card {
      width: 100%;
      background: rgba(30,41,59,0.7);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .weather-icon { font-size: 56px; flex-shrink: 0; }
    .current-info { flex: 1; }
    .city-name { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .country { font-size: 13px; color: #94a3b8; font-family: 'DM Mono', monospace; margin-top: 2px; }
    .temp { font-size: 48px; font-weight: 700; line-height: 1; margin: 8px 0 4px; color: #38bdf8; }
    .desc { font-size: 14px; color: #94a3b8; text-transform: capitalize; }

    .current-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }

    .meta-item {
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(56,189,248,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
    }
    .meta-label { font-size: 10px; font-family: 'DM Mono', monospace; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }
    .meta-val { font-size: 15px; font-weight: 600; margin-top: 3px; color: #e2e8f0; }

    .tip-bar {
      width: 100%;
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #7dd3fc;
      margin-bottom: 16px;
      font-family: 'DM Mono', monospace;
      animation: fadeUp 0.4s ease;
    }

    .forecast-title {
      width: 100%;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .forecast-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      animation: fadeUp 0.5s ease;
    }

    .forecast-card {
      background: rgba(30,41,59,0.6);
      border: 1px solid rgba(56,189,248,0.12);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .fc-day { font-size: 11px; font-family: 'DM Mono', monospace; color: #64748b; margin-bottom: 6px; }
    .fc-icon { font-size: 24px; margin-bottom: 6px; }
    .fc-high { font-size: 15px; font-weight: 600; color: #f8fafc; }
    .fc-low { font-size: 12px; color: #64748b; margin-top: 2px; }

    .error-msg { text-align: center; color: #f87171; font-family: 'DM Mono', monospace; font-size: 13px; padding: 20px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { text-align: center; font-size: 11px; font-family: 'DM Mono', monospace; color: #1e293b; margin-top: 12px; }

    @media (max-width: 500px) {
      .current-card { flex-direction: column; text-align: center; }
      .current-meta { grid-template-columns: repeat(4, 1fr); }
      .forecast-grid { gap: 4px; }
      .forecast-card { padding: 8px 4px; }
      .fc-high { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo">⛅</div>
    <div class="header-text">
      <h1>SkyBot</h1>
      <p>real-time weather forecast</p>
    </div>
    <div class="status"><div class="dot"></div>live</div>
  </div>

  <div id="search-area">
    <input id="city-input" type="text" placeholder="Enter any city — Chennai, London, Tokyo..." />
    <button id="search-btn" onclick="searchWeather()">Search ↗</button>
  </div>

  <div id="quick-wrap">
    <button class="chip" onclick="quickSearch('Chennai')">Chennai</button>
    <button class="chip" onclick="quickSearch('Mumbai')">Mumbai</button>
    <button class="chip" onclick="quickSearch('Delhi')">Delhi</button>
    <button class="chip" onclick="quickSearch('Bangalore')">Bangalore</button>
    <button class="chip" onclick="quickSearch('London')">London</button>
    <button class="chip" onclick="quickSearch('Tokyo')">Tokyo</button>
    <button class="chip" onclick="quickSearch('New York')">New York</button>
  </div>

  <div id="results">
    <div class="placeholder">
      <div class="big">🌍</div>
      <p>search any city to get live weather</p>
    </div>
  </div>
</div>

<div class="footer">powered by open-meteo · 100% free · no api key needed</div>

<script>
  const cityInput = document.getElementById('city-input');
  const resultsEl = document.getElementById('results');
  const searchBtn = document.getElementById('search-btn');

  const WMO = {
    0:  ['☀️','Clear sky'],
    1:  ['🌤️','Mainly clear'], 2: ['⛅','Partly cloudy'], 3: ['☁️','Overcast'],
    45: ['🌫️','Foggy'], 48: ['🌫️','Icy fog'],
    51: ['🌦️','Light drizzle'], 53: ['🌦️','Drizzle'], 55: ['🌧️','Heavy drizzle'],
    61: ['🌧️','Light rain'], 63: ['🌧️','Rain'], 65: ['🌧️','Heavy rain'],
    71: ['🌨️','Light snow'], 73: ['❄️','Snow'], 75: ['❄️','Heavy snow'],
    80: ['🌦️','Rain showers'], 81: ['🌧️','Heavy showers'], 82: ['⛈️','Violent showers'],
    95: ['⛈️','Thunderstorm'], 96: ['⛈️','Thunderstorm with hail'], 99: ['⛈️','Heavy thunderstorm']
  };

  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function getTip(code, temp) {
    if (code >= 95) return '⚡ Thunderstorm alert — stay indoors and avoid open areas.';
    if (code >= 61) return '☔ Rain expected — carry an umbrella today!';
    if (code >= 51) return '🌂 Light drizzle possible — a light jacket or umbrella would help.';
    if (code >= 71) return '🧥 Snow ahead — wear warm layers and waterproof boots.';
    if (code === 45 || code === 48) return '🌫️ Foggy conditions — drive carefully and allow extra travel time.';
    if (temp >= 35) return '🥵 Very hot today — stay hydrated and avoid going out midday.';
    if (temp >= 28) return '😎 Warm and pleasant — light clothes and sunscreen recommended.';
    if (temp <= 10) return '🧣 Cold outside — bundle up with a coat and scarf.';
    return '🌤️ Decent weather today — a good day to head out!';
  }

  function showLoading() {
    resultsEl.innerHTML = '<div class="spinner"></div>';
    resultsEl.style.justifyContent = 'center';
  }

  function showError(msg) {
    resultsEl.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  }

  async function searchWeather() {
    const city = cityInput.value.trim();
    if (!city) return;
    showLoading();
    searchBtn.disabled = true;

    try {
      const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
      const geoData = await geoRes.json();

      if (!geoData.results || geoData.results.length === 0) {
        showError(`City "${city}" not found. Try a different spelling.`);
        searchBtn.disabled = false;
        return;
      }

      const loc = geoData.results[0];
      const { latitude, longitude, name, country } = loc;

      const wxRes = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
        `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weathercode` +
        `&daily=weathercode,temperature_2m_max,temperature_2m_min` +
        `&timezone=auto&forecast_days=5`
      );
      const wx = await wxRes.json();

      const cur = wx.current;
      const daily = wx.daily;
      const temp = Math.round(cur.temperature_2m);
      const code = cur.weathercode;
      const humidity = cur.relative_humidity_2m;
      const wind = Math.round(cur.wind_speed_10m);
      const [icon, desc] = WMO[code] || ['🌡️', 'Unknown'];
      const tip = getTip(code, temp);

      const forecastCards = daily.time.map((date, i) => {
        const d = new Date(date);
        const dayLabel = i === 0 ? 'Today' : DAYS[d.getDay()];
        const [fIcon] = WMO[daily.weathercode[i]] || ['🌡️'];
        const hi = Math.round(daily.temperature_2m_max[i]);
        const lo = Math.round(daily.temperature_2m_min[i]);
        return `
          <div class="forecast-card">
            <div class="fc-day">${dayLabel}</div>
            <div class="fc-icon">${fIcon}</div>
            <div class="fc-high">${hi}°</div>
            <div class="fc-low">${lo}°</div>
          </div>`;
      }).join('');

      resultsEl.style.justifyContent = 'flex-start';
      resultsEl.innerHTML = `
        <div class="current-card">
          <div class="weather-icon">${icon}</div>
          <div class="current-info">
            <div class="city-name">${name}</div>
            <div class="country">${country}</div>
            <div class="temp">${temp}°C</div>
            <div class="desc">${desc}</div>
          </div>
          <div class="current-meta">
            <div class="meta-item">
              <div class="meta-label">Humidity</div>
              <div class="meta-val">${humidity}%</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Wind</div>
              <div class="meta-val">${wind} km/h</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">High</div>
              <div class="meta-val">${Math.round(daily.temperature_2m_max[0])}°</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Low</div>
              <div class="meta-val">${Math.round(daily.temperature_2m_min[0])}°</div>
            </div>
          </div>
        </div>
        <div class="tip-bar">💡 ${tip}</div>
        <div class="forecast-title">5-day forecast</div>
        <div class="forecast-grid">${forecastCards}</div>
      `;

    } catch (e) {
      showError('Could not fetch weather. Check your internet connection.');
    }

    searchBtn.disabled = false;
  }

  function quickSearch(city) {
    cityInput.value = city;
    searchWeather();
  }

  cityInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchWeather(); });
</script>
</body>
</html>
